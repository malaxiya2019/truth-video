# ===================================================
# 📦 TruthVideo 独立 APK 编译工作流
# 构建完全离线运行的 Android App
# 不依赖 Termux / 云端 / 外部服务
# ===================================================

name: 📦 Build Standalone APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: '1.0.0'
      include_demo:
        description: '包含示例 Markdown'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: 🤖 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🔧 Setup Android SDK
        run: |
          # GitHub Actions runner has Android SDK pre-installed
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms yet"

      - name: 🏗 Build APK
        working-directory: ./android
        run: |
          # Create local.properties
          echo "sdk.dir=${ANDROID_HOME:-/usr/local/lib/android/sdk}" > local.properties
          # Build debug APK (no signing needed)
          gradle assembleDebug --no-daemon --info

      - name: 📦 Locate APK
        run: |
          echo "=== APK 文件 ==="
          find ./android -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "未找到 APK"

      - name: ⬆️ Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TruthVideo-Standalone-v${{ inputs.version }}
          path: |
            ./android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: 📋 Summary
        run: |
          echo "## ✅ TruthVideo 独立 APK 编译完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 特性" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 完全离线运行，无需网络" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 不依赖 Termux / Node.js / ffmpeg" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 使用 Android 原生 API 渲染视频" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ WebView → Canvas 截帧" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Android TTS → 语音合成" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ MediaCodec → H.264 编码" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "下载 APK 文件安装到手机即可使用 ⬇️" >> $GITHUB_STEP_SUMMARY
