<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>知识图谱交互播放器 — truth-video</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: #0d1117; color: #e6edf3; height: 100vh; overflow: hidden;
}
.app { display: flex; height: 100vh; }

/* ── 左侧图谱 ── */
.graph-panel { flex: 1; position: relative; background: #0a1628; }
.graph-panel canvas { display: block; width: 100%; height: 100%; }
.graph-title {
  position: absolute; top: 16px; left: 16px;
  font-size: 18px; color: #FFD700; font-weight: bold;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  pointer-events: none;
}
.graph-stats {
  position: absolute; bottom: 16px; left: 16px;
  font-size: 12px; color: #8b949e;
  pointer-events: none;
}
.graph-legend {
  position: absolute; bottom: 16px; right: 16px;
  background: rgba(10,22,40,0.9); border: 1px solid #30363d;
  border-radius: 8px; padding: 10px 14px; font-size: 12px;
}
.graph-legend div { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
.graph-legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

/* ── 右侧面板 ── */
.side-panel {
  width: 340px; background: #161b22; border-left: 1px solid #30363d;
  display: flex; flex-direction: column; overflow: hidden;
}

/* 场景选择器 */
.scene-bar {
  padding: 12px; border-bottom: 1px solid #30363d;
  display: flex; gap: 6px; flex-wrap: wrap;
}
.scene-btn {
  padding: 4px 12px; border: 1px solid #30363d; border-radius: 4px;
  background: #0d1117; color: #8b949e; cursor: pointer; font-size: 12px;
}
.scene-btn.active { background: #FFD700; color: #0d1117; border-color: #FFD700; font-weight: bold; }
.scene-btn:hover { border-color: #58a6ff; }

/* 节点详情 */
.node-detail {
  flex: 1; overflow-y: auto; padding: 16px;
}
.node-detail h3 { font-size: 20px; color: #FFD700; margin-bottom: 8px; }
.node-detail .type-badge {
  display: inline-block; padding: 2px 10px; border-radius: 4px;
  font-size: 12px; margin-bottom: 12px;
}
.node-detail .prop { margin: 6px 0; font-size: 14px; }
.node-detail .prop label { color: #8b949e; font-size: 12px; display: block; }
.node-detail .prop span { color: #e6edf3; }
.node-detail .rel-list { margin-top: 12px; }
.node-detail .rel-item {
  padding: 6px 8px; margin: 4px 0; background: #0d1117;
  border: 1px solid #30363d; border-radius: 4px; font-size: 13px;
  cursor: pointer;
}
.node-detail .rel-item:hover { border-color: #58a6ff; }
.node-detail .hint { color: #8b949e; text-align: center; padding: 40px 20px; }

/* 场景详情 */
.scene-info {
  padding: 12px; border-top: 1px solid #30363d; background: #0d1117;
  font-size: 13px; max-height: 120px; overflow-y: auto;
}
.scene-info .label { color: #8b949e; font-size: 11px; }
.scene-info .body { color: #e6edf3; margin-top: 4px; line-height: 1.4; }
</style>
</head>
<body>
<div class="app">
  <div class="graph-panel">
    <div class="graph-title">🕸 知识图谱</div>
    <canvas id="graphCanvas"></canvas>
    <div class="graph-stats" id="graphStats">加载中...</div>
    <div class="graph-legend" id="graphLegend"></div>
  </div>

  <div class="side-panel">
    <div class="scene-bar" id="sceneBar"></div>
    <div class="node-detail" id="nodeDetail">
      <p class="hint">👆 点击图谱中的节点查看详情</p>
    </div>
    <div class="scene-info" id="sceneInfo"></div>
  </div>
</div>

<script>
// ── 获取 jobId ──
const params = new URLSearchParams(location.search);
const jobId = params.get("job");
if (!jobId) {
  document.body.innerHTML = '<p style="padding:40px;color:#f85149">缺少 job 参数 — 请从 Web UI 打开</p>';
  throw new Error("missing job");
}

// ── 节点类型颜色 ──
const TYPE_COLORS = {
  system:     "#FFD700",
  problem:    "#FF4444",
  solution:   "#00FF88",
  concept:    "#4488FF",
  capability: "#FF8800",
};
const TYPE_LABELS = {
  system:     "系统",
  problem:    "问题",
  solution:   "方案",
  concept:    "概念",
  capability: "能力",
};

// ── 状态 ──
let graph = null;
let scenes = [];
let kgStats = {};
let nodes = [];
let edges = [];
let currentScene = -1; // -1 = 全部

// Canvas 渲染状态
let canvas, ctx;
let simNodes = [];
let simEdges = [];
let selectedNode = null;
let hoveredNode = null;
let animationId = null;
const W = 1280, H = 720;

// ── 加载数据 ──
async function loadData() {
  try {
    const resp = await fetch(`/api/kg/${jobId}`);
    const data = await resp.json();

    if (data.error) {
      document.querySelector(".graph-stats").textContent = data.error;
      document.getElementById("nodeDetail").innerHTML = `<p class="hint" style="color:#f85149">${data.error}</p>`;
      return;
    }

    graph = data.graph;
    scenes = data.scenes || [];
    kgStats = data.kgStats || {};

    nodes = graph.nodes || [];
    edges = graph.edges || [];

    document.getElementById("graphStats").textContent =
      `${nodes.length} 节点, ${edges.length} 边`;

    initSimulation();
    buildSceneBar();
    buildLegend();
    renderLoop();
  } catch (e) {
    document.querySelector(".graph-stats").textContent = "加载失败: " + e.message;
  }
}

// ── 图例 ──
function buildLegend() {
  const el = document.getElementById("graphLegend");
  el.innerHTML = Object.entries(TYPE_COLORS).map(([type, color]) =>
    `<div><span class="dot" style="background:${color}"></span>${TYPE_LABELS[type]||type}</div>`
  ).join("");
}

// ── 场景按钮 ──
function buildSceneBar() {
  const el = document.getElementById("sceneBar");
  let html = '<button class="scene-btn active" data-idx="-1">🌐 全部</button>';
  for (let i = 0; i < scenes.length; i++) {
    html += `<button class="scene-btn" data-idx="${i}">${i + 1}. ${scenes[i].title || `场景 ${i+1}`}</button>`;
  }
  el.innerHTML = html;
  el.querySelectorAll(".scene-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      el.querySelectorAll(".scene-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      currentScene = parseInt(btn.dataset.idx);
      updateSceneInfo();
    });
  });
}

// ── 场景详情 ──
function updateSceneInfo() {
  const el = document.getElementById("sceneInfo");
  if (currentScene < 0 || !scenes[currentScene]) {
    el.innerHTML = "";
    return;
  }
  const s = scenes[currentScene];
  el.innerHTML = `
    <div class="label">场景 ${currentScene + 1}: ${s.title}</div>
    <div class="body">${(s.body || "").slice(0, 200)}</div>
  `;
}

// ── 力导向模拟 ──
function initSimulation() {
  const cx = W / 2, cy = H / 2;
  simNodes = nodes.map((n, i) => ({
    id: n.id,
    label: n.label || n.id,
    type: n.type || "concept",
    x: cx + (Math.random() - 0.5) * 200,
    y: cy + (Math.random() - 0.5) * 200,
    vx: 0, vy: 0,
    radius: 20 + (n.label && /[\u4e00-\u9fff]/.test(n.label) ? 8 : 0),
  }));

  simEdges = edges.map((e) => ({
    from: e.from,
    to: e.to,
    relation: e.relation || "关联",
  }));

  // 60 轮力导向迭代
  const REPULSION = 10000;
  const ATTRACTION = 0.005;
  const GRAVITY = 0.01;
  const IDEAL = 150;
  const DAMPING = 0.85;
  const ITERS = 60;

  for (let iter = 0; iter < ITERS; iter++) {
    for (const n of simNodes) {
      let fx = 0, fy = 0;
      for (const other of simNodes) {
        if (other.id === n.id) continue;
        let dx = n.x - other.x, dy = n.y - other.y;
        let dist = Math.sqrt(dx * dx + dy * dy) + 1;
        const force = REPULSION / (dist * dist);
        fx += (dx / dist) * force;
        fy += (dy / dist) * force;
      }
      for (const e of simEdges) {
        let target = null;
        if (e.from === n.id) target = simNodes.find((sn) => sn.id === e.to);
        if (e.to === n.id) target = simNodes.find((sn) => sn.id === e.from);
        if (!target) continue;
        let dx = target.x - n.x, dy = target.y - n.y;
        let dist = Math.sqrt(dx * dx + dy * dy) + 1;
        fx += (dx / dist) * (dist - IDEAL) * ATTRACTION;
        fy += (dy / dist) * (dist - IDEAL) * ATTRACTION;
      }
      fx += (cx - n.x) * GRAVITY;
      fy += (cy - n.y) * GRAVITY;
      n.vx = (n.vx + fx) * DAMPING;
      n.vy = (n.vy + fy) * DAMPING;
      n.x += n.vx;
      n.y += n.vy;
    }
  }
}

// ── 渲染循环 ──
function renderLoop() {
  if (animationId) cancelAnimationFrame(animationId);
  render();
}

function render() {
  canvas = document.getElementById("graphCanvas");
  ctx = canvas.getContext("2d");

  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";
  ctx.scale(dpr, dpr);

  const scaleX = rect.width / W;
  const scaleY = rect.height / H;
  const scale = Math.min(scaleX, scaleY) * 0.9;
  const offX = (rect.width - W * scale) / 2;
  const offY = (rect.height - H * scale) / 2;

  // 清空
  ctx.fillStyle = "#0a1628";
  ctx.fillRect(0, 0, rect.width, rect.height);

  // 计算活跃节点
  const activeIds = new Set();
  const connIds = new Set();
  if (currentScene >= 0 && scenes[currentScene]) {
    const text = (scenes[currentScene].title + " " + (scenes[currentScene].body || "")).toLowerCase();
    for (const n of simNodes) {
      if (text.includes(n.id.toLowerCase()) || text.includes(n.label.toLowerCase())) {
        activeIds.add(n.id);
      }
    }
    for (const e of simEdges) {
      if (activeIds.has(e.from)) connIds.add(e.to);
      if (activeIds.has(e.to)) connIds.add(e.from);
    }
  }
  // 全部模式时全部活跃
  if (currentScene < 0) {
    for (const n of simNodes) activeIds.add(n.id);
  }

  // 绘制边
  for (const e of simEdges) {
    const from = simNodes.find((n) => n.id === e.from);
    const to = simNodes.find((n) => n.id === e.to);
    if (!from || !to) continue;
    const isActive = activeIds.has(e.from) || activeIds.has(e.to);
    ctx.beginPath();
    ctx.moveTo(from.x * scale + offX, from.y * scale + offY);
    ctx.lineTo(to.x * scale + offX, to.y * scale + offY);
    ctx.strokeStyle = isActive ? "rgba(136,170,255,0.5)" : "rgba(68,68,68,0.15)";
    ctx.lineWidth = isActive ? 2 : 1;
    ctx.stroke();
  }

  // 绘制节点
  for (const n of simNodes) {
    const cx2 = n.x * scale + offX;
    const cy2 = n.y * scale + offY;
    const r = n.radius * scale;
    const isActive = activeIds.has(n.id);
    const isConn = connIds.has(n.id);
    const isHover = hoveredNode && hoveredNode.id === n.id;
    const isSelected = selectedNode && selectedNode.id === n.id;

    let alpha = 1;
    if (!isActive && currentScene >= 0) alpha = isConn ? 0.6 : 0.15;

    const color = TYPE_COLORS[n.type] || "#4488FF";

    // 发光 (选中/悬停)
    if (isSelected || isHover) {
      const grad = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, r * 3);
      grad.addColorStop(0, color + "40");
      grad.addColorStop(1, color + "00");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx2, cy2, r * 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // 圆
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx2, cy2, r, 0, Math.PI * 2);
    ctx.fill();

    if (isSelected || isHover) {
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    // 文字
    ctx.fillStyle = "#ffffff";
    ctx.font = `${Math.max(10, 13 * scale)}px -apple-system, sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const isCN = /[\u4e00-\u9fff]/.test(n.label);
    const textY = cy2 + (isCN ? 4 : 0);
    ctx.fillText(n.label.length > 10 ? n.label.slice(0, 10) + "..." : n.label, cx2, textY);
    ctx.globalAlpha = 1;
  }

  animationId = requestAnimationFrame(render);
}

// ── 鼠标交互 ──
function getNodeAt(x, y) {
  const rect = canvas.parentElement.getBoundingClientRect();
  const scaleX = rect.width / W;
  const scaleY = rect.height / H;
  const scale = Math.min(scaleX, scaleY) * 0.9;
  const offX = (rect.width - W * scale) / 2;
  const offY = (rect.height - H * scale) / 2;

  for (const n of simNodes) {
    const cx2 = n.x * scale + offX;
    const cy2 = n.y * scale + offY;
    const r = n.radius * scale + 5;
    if (Math.abs(x - cx2) < r && Math.abs(y - cy2) < r) return n;
  }
  return null;
}

document.addEventListener("DOMContentLoaded", () => {
  const panel = document.querySelector(".graph-panel");

  panel.addEventListener("mousemove", (e) => {
    const rect = panel.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const n = getNodeAt(x, y);
    panel.style.cursor = n ? "pointer" : "default";
    hoveredNode = n;
  });

  panel.addEventListener("click", (e) => {
    const rect = panel.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const n = getNodeAt(x, y);
    selectedNode = n;
    showNodeDetail(n);
  });

  loadData();
});

// ── 显示节点详情 ──
function showNodeDetail(node) {
  const el = document.getElementById("nodeDetail");
  if (!node) {
    el.innerHTML = '<p class="hint">👆 点击图谱中的节点查看详情</p>';
    return;
  }

  const color = TYPE_COLORS[node.type] || "#4488FF";
  const typeLabel = TYPE_LABELS[node.type] || node.type;

  // 相关的边
  const rels = simEdges.filter((e) => e.from === node.id || e.to === node.id);

  // Truth Router 信息
  const trInfo = kgStats.facts ? kgStats.facts[node.id.toLowerCase()] : null;

  let relHTML = "";
  for (const r of rels) {
    const otherId = r.from === node.id ? r.to : r.from;
    const other = simNodes.find((n) => n.id === otherId);
    const dir = r.from === node.id ? "→" : "←";
    relHTML += `<div class="rel-item" onclick="focusNode('${otherId}')">
      ${r.relation} ${dir} ${other ? (other.label || other.id) : otherId}
    </div>`;
  }

  let trHTML = "";
  if (trInfo) {
    trHTML = `
      <div class="prop"><label>✅ 校验状态</label><span>${trInfo.status || "unknown"} (置信度: ${trInfo.confidence || "?"})</span></div>
      <div class="prop"><label>📝 说明</label><span>${trInfo.explanation || "—"}</span></div>
    `;
  }

  el.innerHTML = `
    <h3>${node.label || node.id}</h3>
    <span class="type-badge" style="background:${color}33;color:${color};border:1px solid ${color}">${typeLabel}</span>
    <div class="prop"><label>🔗 ID</label><span>${node.id}</span></div>
    ${trHTML}
    ${rels.length > 0 ? `<div class="rel-list"><label style="color:#8b949e;font-size:12px">关联 (${rels.length})</label>${relHTML}</div>` : ""}
  `;
}

function focusNode(id) {
  const n = simNodes.find((sn) => sn.id === id);
  if (n) {
    selectedNode = n;
    showNodeDetail(n);
  }
}
</script>
</body>
</html>
