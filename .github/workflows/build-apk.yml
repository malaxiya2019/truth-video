name: 📦 Build Standalone APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: 🔧 Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: 🏗 Build APK
        working-directory: ./android
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          # Download gradle wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.5/bin/gradle assembleDebug --no-daemon --info

      - name: 📦 Locate APK
        run: |
          echo "=== APK 文件 ==="
          find ./android -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "未找到 APK"

      - name: ⬆️ Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TruVid-v${{ inputs.version }}
          path: |
            ./android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
