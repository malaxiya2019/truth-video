name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: truth-video/package-lock.json

      - name: Install dependencies
        run: npm --prefix truth-video install --ignore-scripts

      - name: Install Chromium
        run: npx playwright install chromium
        working-directory: truth-video

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-wqy-zenhei espeak

      - name: Install edge-tts
        run: pip3 install edge-tts

      - name: Run tests
        run: npm --prefix truth-video test

      - name: Test rendering (draft)
        run: node truth-video/src/cli.js truth-video/examples/demo.md --out=/tmp/test-render --quality=draft --truth-mode=off
        timeout-minutes: 10

      - name: Verify output
        run: |
          ls -lh /tmp/test-render/video.mp4
          ls -lh /tmp/test-render/video_lecture.mp4

  docker:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: truth-video
          file: truth-video/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
